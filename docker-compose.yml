# Production compose for VPS — uses a pre-built image loaded via `docker load`.
# Runtime secrets: /opt/careerpulse/.env.prod
# Local builds: use docker-compose.dev.yml

services:
  app:
    image: careerpulse:latest
    container_name: careerpulse
    pull_policy: never
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
