<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
<style>
:root { --primary-color: {{primary_color}}; }
body { font-family: 'Inter', sans-serif; width: 210mm; min-height: 297mm; margin: 0 auto; padding: 16mm 18mm; font-size: 11pt; line-height: 1.5; color: #0f172a; }
.letterhead { border: 2px solid var(--primary-color); padding: 12px 16px; margin-bottom: 20px; min-height: 48px; display: flex; align-items: center; justify-content: center; color: var(--primary-color); font-weight: 600; font-size: 10pt; }
.addr { margin-bottom: 20px; font-size: 10pt; }
@media print { * { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }
</style></head><body>
<div class="letterhead">Professional correspondence</div>
<div class="addr">{{date}}<br/><br/>{{company_name}}<br/>Re: {{job_title}}<br/><br/>{{applicant_name}} · {{applicant_email}} · {{applicant_phone}}</div>
<div>{{cover_letter_body}}</div>
<div style="margin-top:28px;">Yours faithfully,<br/><strong>{{applicant_name}}</strong></div>
</body></html>
