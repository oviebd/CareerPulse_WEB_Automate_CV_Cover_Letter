<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<style>
:root { --primary-color: {{primary_color}}; }
body { position: relative; font-family: 'Inter', sans-serif; width: 210mm; min-height: 297mm; margin: 0 auto; padding: 0; font-size: 11pt; line-height: 1.55; color: #0f172a; }
.stripe { position: absolute; left: 0; top: 0; width: 8mm; height: 100%; background: var(--primary-color); }
.wrap { margin-left: 8mm; padding: 18mm 16mm 18mm 14mm; position: relative; }
.name { font-family: 'DM Sans', sans-serif; font-size: 26pt; font-weight: 700; color: var(--primary-color); line-height: 1.1; margin-bottom: 8px; }
.meta { font-size: 9.5pt; color: #64748b; margin-bottom: 20px; }
@media print { * { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }
</style></head><body>
<div class="stripe"></div>
<div class="wrap">
  <div class="name">{{applicant_name}}</div>
  <div class="meta">{{applicant_email}} · {{applicant_phone}} · {{date}}</div>
  <div style="font-weight:600;margin-bottom:12px;">{{job_title}} @ {{company_name}}</div>
  <div>{{cover_letter_body}}</div>
</div>
</body></html>
