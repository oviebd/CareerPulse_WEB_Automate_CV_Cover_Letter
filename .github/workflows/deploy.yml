name: Deploy CareerPulse

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_SUPABASE_URL="${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            --build-arg NEXT_PUBLIC_APP_URL="${{ secrets.NEXT_PUBLIC_APP_URL }}" \
            --build-arg NEXT_PUBLIC_DEV_SUBSCRIPTION_PLAN="${{ secrets.NEXT_PUBLIC_DEV_SUBSCRIPTION_PLAN }}" \
            -t careerpulse:latest .

      - name: Report image size
        run: |
          docker image ls careerpulse:latest
          docker save careerpulse:latest | gzip -1 | wc -c | awk '{printf "Compressed stream size: %.1f MB\n", $1/1024/1024}'

      - name: Copy docker-compose to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: docker-compose.yml
          target: /opt/careerpulse
          overwrite: true
          timeout: 60s

      - name: Stop app and free disk on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 10m
          script: |
            set -e
            mkdir -p /opt/careerpulse
            cd /opt/careerpulse

            echo "=== Disk before cleanup ==="
            df -h / /var/lib/docker 2>/dev/null || df -h
            docker system df || true

            # Stop the running app so the old image is no longer "in use"
            docker compose down --remove-orphans || true
            docker rm -f careerpulse 2>/dev/null || true

            # Remove the current image so docker load has room for the new one
            docker rmi -f careerpulse:latest 2>/dev/null || true

            # Aggressive cleanup of everything unused
            docker system prune -af || true
            docker builder prune -af || true
            docker volume prune -f || true
            rm -f /tmp/careerpulse.tar.gz

            # Trim system caches when possible (ignore failures)
            sudo journalctl --vacuum-size=100M 2>/dev/null || true
            sudo apt-get clean 2>/dev/null || true

            echo "=== Disk after cleanup ==="
            df -h / /var/lib/docker 2>/dev/null || df -h
            docker system df || true

            # Require at least 2 GB free on root (where containerd stores layers)
            AVAIL_KB=$(df / | awk 'NR==2 {print $4}')
            MIN_KB=$((2 * 1024 * 1024))
            if [ "$AVAIL_KB" -lt "$MIN_KB" ]; then
              echo "ERROR: only $(( AVAIL_KB / 1024 / 1024 ))GB free on / — need at least 2GB for docker load."
              echo "SSH in and run: docker system prune -af && sudo journalctl --vacuum-size=100M"
              exit 1
            fi

      - name: Stream Docker image to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$VPS_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "Streaming image to VPS..."
          docker save careerpulse:latest | gzip -1 | ssh \
            -i ~/.ssh/deploy_key \
            -p "$VPS_PORT" \
            -o StrictHostKeyChecking=accept-new \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=20 \
            "$VPS_USER@$VPS_HOST" \
            'gunzip | docker load'

      - name: Start app on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 10m
          script: |
            set -e
            cd /opt/careerpulse
            docker compose --env-file .env.prod up -d --pull never
            docker compose ps
            docker compose logs --tail=30 app
